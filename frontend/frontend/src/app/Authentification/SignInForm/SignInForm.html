<form (submit)="$event.preventDefault(); submit()">

    <div class="form-container">

        <!-- EMAIL -->
        <label>
            <span>E-Mail</span>
            <input type="text"
                   [formField]="form.email"
                   [class.invalid]="form.email().invalid()" />

            @if (submitted() && form.email().invalid()) {
                <span class="error-text">
          {{ form.email().errors()?.[0]?.message }}
        </span>
            }
        </label>

        <!-- PASSWORD -->
        <label>
            <span>Passwort</span>
            <input type="password"
                   [formField]="form.password"
                   [class.invalid]="form.password().invalid()" />

            @if (submitted() && form.password().invalid()) {
                <span class="error-text">
          {{ form.password().errors()?.[0]?.message }}
        </span>
            }
        </label>

        <!-- BACKEND ERROR -->
        @if (backendError()) {
            <div class="error-text" style="margin-top: 10px;">
                {{ backendError() }}
            </div>
        }

        <!-- BUTTON -->
        <button class="btn btn-primary w-100"
                type="submit"
                [disabled]="form().submitting() || !isValid()">
            Anmelden
        </button>

    </div>

</form>
